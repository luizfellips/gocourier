global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8080']

  - job_name: worker
    static_configs:
      - targets: ['worker:9091']

  - job_name: scheduler
    static_configs:
      - targets: ['scheduler:9092']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: nats
    metrics_path: /varz
    static_configs:
      - targets: ['nats:8222']
