services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gocourier
      POSTGRES_PASSWORD: gocourier
      POSTGRES_DB: gocourier
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gocourier -d gocourier"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "-sd", "/data"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.15.0
    command: ["-varz", "-connz", "-jsz=all", "http://nats:8222"]
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - internal

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - internal

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempodata:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v2.51.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    networks:
      - internal

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
    networks:
      - internal
      - public

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["/app/api"]
    environment:
      SERVICE_NAME: api
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://gocourier:gocourier@postgres:5432/gocourier?sslmode=disable
      NATS_URL: nats://nats:4222
      API_KEYS: dev-api-key
      LOG_LEVEL: info
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: api
      OTEL_TRACES_SAMPLER: parentbased_always_on
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - internal
      - public

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["/app/worker"]
    environment:
      SERVICE_NAME: worker
      DATABASE_URL: postgres://gocourier:gocourier@postgres:5432/gocourier?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      WORKER_CONCURRENCY: "10"
      METRICS_ADDR: ":9091"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: worker
      OTEL_TRACES_SAMPLER: parentbased_always_on
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - internal

  scheduler:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["/app/scheduler"]
    environment:
      SERVICE_NAME: scheduler
      DATABASE_URL: postgres://gocourier:gocourier@postgres:5432/gocourier?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      METRICS_ADDR: ":9092"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: scheduler
      OTEL_TRACES_SAMPLER: parentbased_always_on
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - internal

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public
      - internal

volumes:
  pgdata:
  natsdata:
  tempodata:

networks:
  internal:
  public:
