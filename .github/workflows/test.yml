name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 2 * * *"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Build
        run: go build -v ./...
      - name: Unit tests
        run: go test -count=1 -coverprofile=coverage.out ./internal/... ./pkg/...
      - name: Coverage summary
        run: go tool cover -func=coverage.out

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Integration tests
        run: go test -tags=integration -timeout 20m -count=1 ./tests/integration/... ./tests/idempotency/... ./tests/replay/... ./tests/observability/...

  security:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Security tests
        run: go test -tags=security -timeout 15m -count=1 ./tests/security/...

  concurrency:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Concurrency tests (100)
        run: go test -tags=concurrency -race -timeout 30m -count=1 -run TestConcurrent100 ./tests/concurrency/...

  nightly-load:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: k6 load test placeholder
        run: echo "Run k6 against staging — see tests/performance/k6/ingest_load.js"

  weekly-chaos:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Chaos tests
        env:
          RUN_CHAOS: "1"
        run: go test -tags=chaos -timeout 20m -count=1 ./tests/chaos/...
